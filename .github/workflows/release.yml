name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64     go build -ldflags="-s -w" -o dist/gif2cpp-linux-amd64 .
          GOOS=linux   GOARCH=arm64     go build -ldflags="-s -w" -o dist/gif2cpp-linux-arm64 .
          GOOS=darwin  GOARCH=amd64     go build -ldflags="-s -w" -o dist/gif2cpp-mac-amd64 .
          GOOS=darwin  GOARCH=arm64     go build -ldflags="-s -w" -o dist/gif2cpp-mac-arm64 .
          GOOS=windows GOARCH=amd64     go build -ldflags="-s -w" -o dist/gif2cpp-windows-amd64.exe .
          GOOS=windows GOARCH=arm64     go build -ldflags="-s -w" -o dist/gif2cpp-windows-arm64.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
